services:
  - type: web
    name: hidden-gem-discovery
    runtime: python
    runtimeVersion: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: python spotify_auth_server.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SPOTIFY_CLIENT_ID
        scope: run
      - key: SPOTIFY_CLIENT_SECRET
        scope: run
      - key: REDIRECT_URI
        value: https://your-render-domain.onrender.com/callback
